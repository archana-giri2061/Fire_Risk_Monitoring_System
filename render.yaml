services:
  # ── Express Backend ─────────────────────────────────────────────────────
  - type: web
    name: fire-risk-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: node dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: RESEND_API_KEY
        sync: false          # set in Render dashboard
      - key: ALERT_FROM_EMAIL
        value: onboarding@resend.dev
      - key: ALERT_TO_EMAIL
        sync: false          # set in Render dashboard
      - key: LATITUDE
        value: "28.002"
      - key: LONGITUDE
        value: "83.036"
      - key: LOCATION_KEY
        value: lumbini_28.002_83.036
      - key: ARCHIVE_DAYS
        value: "60"
      - key: FORECAST_DAYS
        value: "7"
      - key: SYNC_ON_START
        value: "false"
      - key: SYNC_INTERVAL_MINUTES
        value: "30"
      - key: DATASET_EXPORT_PATH
        value: ml/data/live_weather_dataset.csv
      - key: EXCEL_PATH
        value: ml/data/ForestfireData.xlsx
      - key: MODEL_PATH
        value: ml/models/fire_risk_model_lr.joblib
      - key: FRONTEND_URL
        value: https://fire-risk-monitoring-system-2.onrender.com

  # ── React Frontend (static site) ────────────────────────────────────────
  - type: web
    name: fire-risk-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fire-risk-backend.onrender.com